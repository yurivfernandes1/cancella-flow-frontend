<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <!-- PWA Meta tags -->
  <meta name="theme-color" content="#6F0FAF" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Cancella Flow" />
  <meta name="description" content="Sistema completo para gestão de condomínios, síndicos, funcionários e moradores" />

  <!-- Open Graph (WhatsApp, Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Cancella Flow" />
  <meta property="og:description"
    content="Sistema completo para gestão de condomínios, síndicos, funcionários e moradores" />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Cancella Flow" />
  <meta property="og:site_name" content="Cancella Flow" />

  <!-- Twitter Card (também funciona no Telegram) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Cancella Flow" />
  <meta name="twitter:description"
    content="Sistema completo para gestão de condomínios, síndicos, funcionários e moradores" />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- iOS specific -->
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

  <title>Cancella Flow</title>
